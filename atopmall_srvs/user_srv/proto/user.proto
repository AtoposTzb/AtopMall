syntax = "proto3";
import "google/protobuf/empty.proto";
option go_package = "atopmall_web/user_web/proto";

service User {
  rpc GetUserList(PageInfo) returns (UserListResponse); //用户列表 一般后台管理系统使用的接口
  rpc GetUserByMobile(MobileRequest) returns (UserInfoResponse); //根据手机号查询用户信息
  rpc GetUserById(IdRequest) returns (UserInfoResponse); //根据用户id查询用户信息
  rpc CreateUser(CreateUserInfo) returns (UserInfoResponse); //添加用户
  rpc UpdateUser(UpdateUserInfo) returns (google.protobuf.Empty); //更新用户信息,不关心返回值
  rpc CheckPassWord(PasswordCheckInfo) returns (CheckResponse); //检查密码
}
message PasswordCheckInfo {
  string password = 1;
  string encryptedPassword = 2;
}
message CheckResponse {
  bool success = 1;
}

message PageInfo {
  uint32 pageNum = 1;
  uint32 pageSize = 2;
}
message MobileRequest {
  string mobile = 1;
}
message IdRequest {
  int32 id = 1;
}
message CreateUserInfo {
  string nickName = 1;
  string password = 2;
  string mobile = 3;
}
message UpdateUserInfo {
  int32 id = 1;
  string nickName = 2;
  string gender = 3;
  uint64 birthDay = 4;
}
message UserInfoResponse {
  int32 id = 1;
  string nickName = 2;
  string password = 3;
  string mobile = 4;
  string gender = 5;
  uint64 birthDay = 6;
  int32 rolo = 7;
}
message UserListResponse {
  uint32 total = 1;
  repeated UserInfoResponse data = 2;
}