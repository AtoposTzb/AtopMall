<!doctype html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <title>MinIO 文件上传</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .upload-area {
        border: 2px dashed #ccc;
        padding: 30px;
        text-align: center;
        margin: 20px 0;
        border-radius: 8px;
      }
      .upload-area:hover {
        border-color: #4caf50;
      }
      #fileInput {
        display: none;
      }
      .btn {
        background: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin: 5px;
      }
      .btn:hover {
        background: #45a049;
      }
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #fileList {
        margin: 20px 0;
      }
      .file-item {
        padding: 10px;
        border: 1px solid #eee;
        margin: 5px 0;
        border-radius: 4px;
      }
      .file-name {
        font-weight: bold;
      }
      .progress-bar {
        background: #f0f0f0;
        height: 20px;
        border-radius: 4px;
        overflow: hidden;
        margin: 5px 0;
      }
      .progress-fill {
        background: #4caf50;
        height: 100%;
        width: 0%;
        transition: width 0.3s;
      }
      .file-url {
        color: #2196f3;
        word-break: break-all;
        font-size: 12px;
      }
      .error {
        color: #f44336;
      }
      .success {
        color: #4caf50;
      }
      #console {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 4px;
        margin-top: 20px;
        white-space: pre-wrap;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h2>MinIO 文件直传</h2>
    <p>基于 MinIO 预签名 PUT 直传，前端直接上传文件到 MinIO 服务器</p>

    <div class="upload-area" id="dropArea">
      <p>拖拽文件到此处，或点击选择文件</p>
      <input type="file" id="fileInput" multiple />
      <button
        class="btn"
        onclick="document.getElementById('fileInput').click()"
      >
        选择文件
      </button>
    </div>

    <div id="fileList"></div>

    <div id="console"></div>

    <script>
      // 配置：修改为你的 oss_web 服务地址
      var TOKEN_URL = "http://192.168.1.6:8083/oss/v1/oss/token";

      var fileInput = document.getElementById("fileInput");
      var fileList = document.getElementById("fileList");
      var consoleDiv = document.getElementById("console");
      var dropArea = document.getElementById("dropArea");

      function log(msg, type) {
        var span = document.createElement("span");
        span.className = type || "";
        span.textContent = msg + "\n";
        consoleDiv.appendChild(span);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
      }

      // 获取上传凭证
      function getToken() {
        return new Promise(function (resolve, reject) {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", TOKEN_URL, true);
          xhr.onload = function () {
            if (xhr.status === 200) {
              try {
                var data = JSON.parse(xhr.responseText);
                if (data.code === 200) {
                  resolve(data.data);
                } else {
                  reject("获取凭证失败: " + data.msg);
                }
              } catch (e) {
                reject("解析响应失败: " + e.message);
              }
            } else {
              reject("请求失败，状态码: " + xhr.status);
            }
          };
          xhr.onerror = function () {
            reject("网络错误");
          };
          xhr.send();
        });
      }

      // 上传单个文件
      function uploadFile(file) {
        var itemId =
          "file-" + Date.now() + "-" + Math.random().toString(36).substr(2, 5);
        var itemHtml =
          '<div class="file-item" id="' +
          itemId +
          '">' +
          '<div class="file-name">' +
          file.name +
          " (" +
          formatSize(file.size) +
          ")</div>" +
          '<div class="progress-bar"><div class="progress-fill" id="progress-' +
          itemId +
          '"></div></div>' +
          '<div id="status-' +
          itemId +
          '"></div>' +
          "</div>";
        fileList.innerHTML += itemHtml;

        getToken()
          .then(function (tokenData) {
            var uploadUrl = tokenData.upload_url;
            var fileUrl = tokenData.url;

            log("开始上传: " + file.name);

            var xhr = new XMLHttpRequest();
            xhr.open("PUT", uploadUrl, true);

            xhr.upload.onprogress = function (e) {
              if (e.lengthComputable) {
                var percent = Math.round((e.loaded / e.total) * 100);
                document.getElementById("progress-" + itemId).style.width =
                  percent + "%";
              }
            };

            xhr.onload = function () {
              if (xhr.status === 200) {
                document.getElementById("status-" + itemId).innerHTML =
                  '<span class="success">上传成功！</span><br/>' +
                  '<span class="file-url">访问地址: ' +
                  fileUrl +
                  "</span>";
                log("上传成功: " + file.name + " -> " + fileUrl, "success");
              } else {
                document.getElementById("status-" + itemId).innerHTML =
                  '<span class="error">上传失败，状态码: ' +
                  xhr.status +
                  "</span>";
                log(
                  "上传失败: " + file.name + " 状态码: " + xhr.status,
                  "error",
                );
              }
            };

            xhr.onerror = function () {
              document.getElementById("status-" + itemId).innerHTML =
                '<span class="error">网络错误</span>';
              log("网络错误: " + file.name, "error");
            };

            xhr.send(file);
          })
          .catch(function (err) {
            document.getElementById("status-" + itemId).innerHTML =
              '<span class="error">' + err + "</span>";
            log("错误: " + err, "error");
          });
      }

      function formatSize(bytes) {
        if (bytes === 0) return "0 B";
        var k = 1024;
        var sizes = ["B", "KB", "MB", "GB"];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      // 文件选择
      fileInput.addEventListener("change", function (e) {
        var files = e.target.files;
        for (var i = 0; i < files.length; i++) {
          uploadFile(files[i]);
        }
        fileInput.value = ""; // 清空，允许重复选择同一文件
      });

      // 拖拽上传
      dropArea.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropArea.style.borderColor = "#4CAF50";
      });

      dropArea.addEventListener("dragleave", function (e) {
        e.preventDefault();
        dropArea.style.borderColor = "#ccc";
      });

      dropArea.addEventListener("drop", function (e) {
        e.preventDefault();
        dropArea.style.borderColor = "#ccc";
        var files = e.dataTransfer.files;
        for (var i = 0; i < files.length; i++) {
          uploadFile(files[i]);
        }
      });
    </script>
  </body>
</html>
