#nacos配置中心配置初始化

host: "192.168.1.106" #nacos主机ip 或域名
port: 8848 #nacos端口
namespaceId: "3137c2a9-c7a8-431e-aef4-100986fb99b3" #命名空间ID
timeoutMs: 5000 #超时时间 ，官网默认5秒
notLoadCacheAtStart: true #是否在启动时加载缓存，默认false
logDir: "tmp/nacos/log" #日志目录
cacheDir: "tmp/nacos/cache" #缓存目录
logLevel: "debug" #日志级别
user: "nacos" #nacos用户名 登录鉴权
password: "nacos" #nacos密码 登录鉴权
dataid: "order-web.json" #nacos数据ID
group: "dev" #nacos分组

