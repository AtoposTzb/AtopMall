syntax = "proto3";
import "google/protobuf/empty.proto";
option go_package = "atopmall_srvs/inventory_srv/proto";

service Inventory {
  rpc SetInv(GoodsInvInfo) returns (google.protobuf.Empty); //设置库存
  rpc InvDetail(GoodsInvInfo) returns (GoodsInvInfo); //获取库存详情
  rpc SellInv(SellInfo) returns (google.protobuf.Empty); //扣减库存
  rpc RebackInv(SellInfo) returns (google.protobuf.Empty); //库存归还
}

message GoodsInvInfo {
  int32 goodsId = 1;
  int32 num = 2;
}
message SellInfo {
  repeated GoodsInvInfo goodsInfo = 1;
}